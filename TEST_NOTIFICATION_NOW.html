<!DOCTYPE html>
<html>
<head>
    <title>Test Notification - Komunidad</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <h1>Create Test Notification</h1>
    <button onclick="createTestNotification()" style="padding: 20px; font-size: 18px; background: #4CAF50; color: white; border: none; cursor: pointer;">
        📲 CREATE TEST NOTIFICATION
    </button>
    <p id="status" style="margin-top: 20px; font-size: 16px;"></p>

    <script>
        // Your Firebase config (from your admin dashboard)
        const firebaseConfig = {
            apiKey: "AIzaSyBdtQBW7bgn4lVyVvCxHgOOlVZxO01eygs",
            authDomain: "komunidad-36f9b.firebaseapp.com",
            projectId: "komunidad-36f9b",
            storageBucket: "komunidad-36f9b.firebasestorage.app",
            messagingSenderId: "888930015901",
            appId: "1:888930015901:web:1e2b71fe83ef6959e1e6c1"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function createTestNotification() {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = 'Creating notification...';
            
            try {
                await db.collection('notifications').add({
                    userId: 'DLthdLzxkLbqwFFccFckDtqjIv1', // Your user ID
                    title: '📋 Report Status Updated',
                    body: 'Your report "Haha" is now being processed by the admin team.',
                    type: 'report',
                    actionId: 'test_report_123',
                    isRead: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                statusEl.innerHTML = '✅ <strong>SUCCESS!</strong> Notification created! Check your Flutter app now!';
                statusEl.style.color = 'green';
            } catch (error) {
                statusEl.innerHTML = '❌ Error: ' + error.message;
                statusEl.style.color = 'red';
                console.error(error);
            }
        }
    </script>
</body>
</html>
